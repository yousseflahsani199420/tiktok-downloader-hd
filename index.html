<body>
<div id="root"></div>

<!-- Hidden SEO Content -->
<section class="seo-hidden" aria-hidden="true">
<h2>TikTok Video Downloader</h2>
<p>Download TikTok videos without watermark in HD, SD or MP3 format instantly online.</p>
<p>Fast free TikTok downloader compatible with mobile, desktop and tablet devices.</p>
</section>

<script type="text/babel">
const {useState}=React;

const App=()=>(
<main className="min-h-screen py-8 px-4">
<Header/>
<div className="max-w-4xl mx-auto space-y-6">
<DownloadCard/>
<Features/>
<Footer/>
</div>
</main>
);

const Header=()=>(
<header className="text-center mb-8">
<h1 className="text-4xl md:text-5xl font-bold text-white mb-2">🎵 TikTok Downloader</h1>
<p className="text-white/80 text-lg">Direct download to your device - No waiting!</p>
</header>
);

const DownloadCard=()=>{
const[url,setUrl]=useState('');
const[quality,setQuality]=useState('hd');
const[loading,setLoading]=useState(false);
const[downloading,setDownloading]=useState(false);
const[downloadProgress,setDownloadProgress]=useState(0);
const[error,setError]=useState('');
const[success,setSuccess]=useState('');
const[videoInfo,setVideoInfo]=useState(null);

const pasteFromClipboard=async()=>{
try{setUrl(await navigator.clipboard.readText());}
catch{setError('Cannot access clipboard');}
};

const fetchVideo=async()=>{
if(!url.trim())return setError('Please enter a TikTok URL');
if(!url.includes('tiktok.com'))return setError('Please enter a valid TikTok URL');
setLoading(true);setError('');setSuccess('');setVideoInfo(null);

try{
const r=await fetch('https://www.tikwm.com/api/',{
method:'POST',
headers:{'Content-Type':'application/x-www-form-urlencoded'},
body:`url=${encodeURIComponent(url)}&hd=${quality==='hd'?1:0}`
});
if(!r.ok)throw Error();
const d=await r.json();
if(d.data?.play){
setVideoInfo({url:d.data.play,title:d.data.title||'TikTok Video',author:d.data.author?.nickname||'Unknown'});
setSuccess('Video found! Click download.');
}else throw Error();
}catch{setError('Failed to fetch video.');}
finally{setLoading(false);}
};

const downloadDirect=async()=>{
if(!videoInfo)return;
setDownloading(true);setDownloadProgress(0);
try{
const res=await fetch(videoInfo.url);
const total=parseInt(res.headers.get('content-length'),10);
let loaded=0;
const reader=res.body.getReader();
const stream=new ReadableStream({
start(controller){
function pump(){
return reader.read().then(({done,value})=>{
if(done){controller.close();return;}
loaded+=value.byteLength;
if(total)setDownloadProgress(Math.round(loaded/total*100));
controller.enqueue(value);
return pump();
});
}
return pump();
}});
const blob=await new Response(stream).blob();
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download=`${videoInfo.title.replace(/[^a-z0-9]/gi,'_')}_${quality}.mp4`;
document.body.appendChild(a);a.click();a.remove();
}catch{window.open(videoInfo.url,'_blank');}
finally{setDownloading(false);setDownloadProgress(0);}
};

return(
<section className="glass-effect rounded-2xl p-6 md:p-8 shadow-2xl">

<div className="mb-6">
<label className="block text-gray-700 font-semibold mb-2">TikTok Video URL</label>
<div className="flex gap-2">
<input value={url} onChange={e=>setUrl(e.target.value)}
placeholder="https://www.tiktok.com/@username/video/123"
className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none"/>
<button onClick={pasteFromClipboard} className="px-4 py-3 bg-gray-100 rounded-xl">📋</button>
</div>
</div>

<div className="mb-6">
<label className="block text-gray-700 font-semibold mb-3">Select Quality</label>
<div className="grid grid-cols-3 gap-3">
{[
{id:'hd',icon:'🎬',label:'HD',desc:'Best Quality'},
{id:'sd',icon:'📱',label:'SD',desc:'Smaller Size'},
{id:'audio',icon:'🎵',label:'Audio',desc:'MP3 Only'}
].map(q=>(
<div key={q.id} onClick={()=>setQuality(q.id)}
className={`quality-card cursor-pointer border-2 rounded-xl p-4 text-center ${quality===q.id?'selected border-indigo-500':'border-gray-200'}`}>
<div className="text-2xl">{q.icon}</div>
<div className="font-bold">{q.label}</div>
<div className="text-xs text-gray-500">{q.desc}</div>
</div>
))}
</div>
</div>

{!videoInfo&&(
<button onClick={fetchVideo} disabled={loading}
className="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold rounded-xl">
{loading?'Finding video...':'Find Video'}
</button>
)}

{videoInfo&&!downloading&&(
<div className="fade-in">
<div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-4">
<h3 className="font-bold text-green-800">Video Found!</h3>
<p className="text-sm">{videoInfo.title}</p>
</div>
<button onClick={downloadDirect}
className="w-full py-4 bg-green-600 text-white font-bold rounded-xl">
Download Now
</button>
</div>
)}

{downloading&&(
<div className="bg-blue-50 rounded-xl p-6 text-center">
<p>Downloading {downloadProgress}%</p>
<div className="progress-bar">
<div className="progress-fill" style={{width:`${downloadProgress}%`}}></div>
</div>
</div>
)}

{error&&<div className="mt-4 p-4 bg-red-50 text-red-700">{error}</div>}
{success&&<div className="mt-4 p-4 bg-green-50 text-green-700">{success}</div>}
</section>
);
};

const Features=()=>(
<section className="grid grid-cols-2 md:grid-cols-4 gap-4">
{[
['🛡️','No Watermark'],
['⚡','Fast Download'],
['🔒','Safe'],
['📱','All Devices']
].map((f,i)=>(
<div key={i} className="bg-white/10 rounded-xl p-4 text-center text-white">
<div className="text-3xl">{f[0]}</div>
<h3 className="text-sm font-semibold">{f[1]}</h3>
</div>
))}
</section>
);

const Footer=()=>(
<footer className="text-center text-white/70 text-sm py-4">
<p>⚠️ For educational purposes only.</p>
<p>© 2024 TikTok Downloader</p>
</footer>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
