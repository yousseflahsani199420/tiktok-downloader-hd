<!DOCTYPE html>
<html lang="en">

<head>
     <!-- React +++ -->
    <title>TikTok Downloader HD - Download TikTok Videos Without Watermark</title>
<meta name="description" content="Download TikTok videos without watermark in HD quality. Fast, free and easy TikTok downloader.">
<meta name="keywords" content="tiktok downloader, download tiktok video, tiktok no watermark">
<meta name="robots" content="index, follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="canonical" href="https://tiktokdownloader.online">
     <!-- React CDN -->
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            width: 24px;
            height: 24px;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .progress-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        
        .quality-card {
            transition: all 0.3s ease;
        }
        
        .quality-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }
        
        .quality-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15, #764ba215);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Main App Component
        const App = () => {
            return (
                <div className="min-h-screen py-8 px-4">
                    <Header />
                    <div className="max-w-4xl mx-auto space-y-6">
                        <DownloadCard />
                        <Features />
                        <Footer />
                    </div>
                </div>
            );
        };

        // Header Component
        const Header = () => (
            <header className="text-center mb-8">
                <h1 className="text-4xl md:text-5xl font-bold text-white mb-2">
                    🎵 TikTok Downloader
                </h1>
                <p className="text-white/80 text-lg">
                    Direct download to your device - No waiting!
                </p>
            </header>
        );

        // Download Card Component
        const DownloadCard = () => {
            const [url, setUrl] = useState('');
            const [quality, setQuality] = useState('hd');
            const [loading, setLoading] = useState(false);
            const [downloading, setDownloading] = useState(false);
            const [downloadProgress, setDownloadProgress] = useState(0);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [videoInfo, setVideoInfo] = useState(null);

            const pasteFromClipboard = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    setUrl(text);
                } catch (err) {
                    setError('Cannot access clipboard');
                }
            };

            const fetchVideo = async () => {
                if (!url.trim()) {
                    setError('Please enter a TikTok URL');
                    return;
                }

                if (!url.includes('tiktok.com')) {
                    setError('Please enter a valid TikTok URL');
                    return;
                }

                setLoading(true);
                setError('');
                setSuccess('');
                setVideoInfo(null);

                try {
                    // Try TikWM API
                    const response = await fetch('https://www.tikwm.com/api/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: `url=${encodeURIComponent(url)}&hd=${quality === 'hd' ? 1 : 0}`
                    });

                    if (!response.ok) {
                        throw new Error('API request failed');
                    }

                    const data = await response.json();

                    if (data.data && data.data.play) {
                        setVideoInfo({
                            url: data.data.play,
                            title: data.data.title || 'TikTok Video',
                            author: data.data.author?.nickname || 'Unknown',
                            cover: data.data.cover
                        });
                        setSuccess('Video found! Click "Download Now" to save to your device.');
                    } else {
                        throw new Error('No video URL in response');
                    }
                } catch (err) {
                    setError('Failed to fetch video. The API might be temporarily unavailable.');
                } finally {
                    setLoading(false);
                }
            };

            const downloadDirect = async () => {
                if (!videoInfo) return;

                setDownloading(true);
                setDownloadProgress(0);

                try {
                    // Fetch the video as a blob with progress tracking
                    const response = await fetch(videoInfo.url);
                    
                    if (!response.ok) {
                        throw new Error('Download failed');
                    }

                    // Get content length for progress
                    const contentLength = response.headers.get('content-length');
                    const total = parseInt(contentLength, 10);
                    let loaded = 0;

                    // Create a new response to track progress
                    const reader = response.body.getReader();
                    const stream = new ReadableStream({
                        start(controller) {
                            function pump() {
                                return reader.read().then(({ done, value }) => {
                                    if (done) {
                                        controller.close();
                                        return;
                                    }
                                    loaded += value.byteLength;
                                    if (total) {
                                        const progress = (loaded / total) * 100;
                                        setDownloadProgress(Math.round(progress));
                                    }
                                    controller.enqueue(value);
                                    return pump();
                                });
                            }
                            return pump();
                        }
                    });

                    const newResponse = new Response(stream);
                    const blob = await newResponse.blob();

                    // Create download link
                    const blobUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    
                    // Set filename
                    const filename = `${videoInfo.title.replace(/[^a-z0-9]/gi, '_')}_${quality}.mp4`;
                    link.download = filename;
                    
                    // Trigger download
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Cleanup
                    window.URL.revokeObjectURL(blobUrl);
                    
                    setSuccess(`✅ Downloaded: ${filename}`);
                } catch (err) {
                    setError('Download failed. Trying alternative method...');
                    
                    // Fallback: Open in new tab
                    window.open(videoInfo.url, '_blank');
                } finally {
                    setDownloading(false);
                    setDownloadProgress(0);
                }
            };

            return (
                <div className="glass-effect rounded-2xl p-6 md:p-8 shadow-2xl">
                    {/* URL Input */}
                    <div className="mb-6">
                        <label className="block text-gray-700 font-semibold mb-2">
                            TikTok Video URL
                        </label>
                        <div className="flex gap-2">
                            <input
                                type="text"
                                value={url}
                                onChange={(e) => setUrl(e.target.value)}
                                placeholder="https://www.tiktok.com/@username/video/1234567890"
                                className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none transition-colors"
                                onKeyPress={(e) => e.key === 'Enter' && fetchVideo()}
                            />
                            <button
                                onClick={pasteFromClipboard}
                                className="px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors"
                                title="Paste from clipboard"
                            >
                                📋
                            </button>
                        </div>
                    </div>

                    {/* Quality Selector */}
                    <div className="mb-6">
                        <label className="block text-gray-700 font-semibold mb-3">
                            Select Quality
                        </label>
                        <div className="grid grid-cols-3 gap-3">
                            {[
                                { id: 'hd', icon: '🎬', label: 'HD', desc: 'Best Quality' },
                                { id: 'sd', icon: '📱', label: 'SD', desc: 'Smaller Size' },
                                { id: 'audio', icon: '🎵', label: 'Audio', desc: 'MP3 Only' }
                            ].map((q) => (
                                <div
                                    key={q.id}
                                    onClick={() => setQuality(q.id)}
                                    className={`quality-card cursor-pointer border-2 rounded-xl p-4 text-center ${
                                        quality === q.id ? 'selected border-indigo-500' : 'border-gray-200'
                                    }`}
                                >
                                    <div className="text-2xl mb-1">{q.icon}</div>
                                    <div className="font-bold text-gray-800">{q.label}</div>
                                    <div className="text-xs text-gray-500">{q.desc}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Step 1: Fetch Video */}
                    {!videoInfo && (
                        <button
                            onClick={fetchVideo}
                            disabled={loading}
                            className="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold rounded-xl hover:shadow-lg transform transition-all disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                        >
                            {loading ? (
                                <>
                                    <div className="spinner"></div>
                                    <span>Finding video...</span>
                                </>
                            ) : (
                                <>
                                    <span>🔍</span>
                                    <span>Find Video</span>
                                </>
                            )}
                        </button>
                    )}

                    {/* Step 2: Download Video */}
                    {videoInfo && !downloading && (
                        <div className="fade-in">
                            <div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-4">
                                <h3 className="font-bold text-green-800 mb-1">✅ Video Found!</h3>
                                <p className="text-sm text-green-700">{videoInfo.title}</p>
                                <p className="text-xs text-green-600">👤 {videoInfo.author}</p>
                            </div>
                            
                            <button
                                onClick={downloadDirect}
                                className="w-full py-4 bg-gradient-to-r from-green-500 to-green-600 text-white font-bold rounded-xl hover:shadow-lg transform transition-all flex items-center justify-center gap-2"
                            >
                                <span>⬇️</span>
                                <span>Download Now</span>
                            </button>
                            
                            <button
                                onClick={() => setVideoInfo(null)}
                                className="w-full mt-2 py-2 text-gray-500 hover:text-gray-700 text-sm"
                            >
                                ← Search different video
                            </button>
                        </div>
                    )}

                    {/* Download Progress */}
                    {downloading && (
                        <div className="bg-blue-50 rounded-xl p-6 text-center">
                            <div className="spinner mx-auto mb-3"></div>
                            <p className="text-blue-800 font-semibold">Downloading...</p>
                            <p className="text-blue-600 text-sm">{downloadProgress}% complete</p>
                            <div className="progress-bar">
                                <div 
                                    className="progress-fill" 
                                    style={{width: `${downloadProgress}%`}}
                                ></div>
                            </div>
                        </div>
                    )}

                    {/* Messages */}
                    {error && (
                        <div className="mt-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r-lg fade-in">
                            <div className="flex items-center gap-2">
                                <span>⚠️</span>
                                <span>{error}</span>
                            </div>
                        </div>
                    )}

                    {success && !downloading && (
                        <div className="mt-4 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded-r-lg fade-in">
                            <div className="flex items-center gap-2">
                                <span>✅</span>
                                <span>{success}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Features Component
        const Features = () => {
            const features = [
                { icon: '🛡️', title: 'No Watermark', desc: 'Clean videos' },
                { icon: '⚡', title: 'Fast Download', desc: 'Direct to device' },
                { icon: '🔒', title: '100% Safe', desc: 'No registration' },
                { icon: '📱', title: 'All Devices', desc: 'Mobile & Desktop' }
            ];

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {features.map((feature, index) => (
                        <div key={index} className="bg-white/10 backdrop-blur-sm rounded-xl p-4 text-center text-white border border-white/20 hover:bg-white/20 transition-colors">
                            <div className="text-3xl mb-2">{feature.icon}</div>
                            <h3 className="font-semibold text-sm">{feature.title}</h3>
                            <p className="text-xs text-white/80">{feature.desc}</p>
                        </div>
                    ))}
                </div>
            );
        };

        // Footer Component
        const Footer = () => (
            <footer className="text-center text-white/70 text-sm py-4">
                <p>⚠️ For educational purposes only. Respect copyright laws.</p>
                <p className="mt-1">© 2024 TikTok Downloader Pro. Not affiliated with TikTok.</p>
            </footer>
        );

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
