<!-- Technical -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3TDZE61768"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

<!-- Structured Data (SEO Boost) -->

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
}
.glass{background:rgba(255,255,255,.95);backdrop-filter:blur(10px)}
</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState}=React;

const Logo=()=>(
<div className="flex justify-center mb-4">
<svg width="60" height="60" viewBox="0 0 100 100">
<defs>
<linearGradient id="g" x1="0" x2="1">
<stop offset="0%" stopColor="#25F4EE"/>
<stop offset="100%" stopColor="#FE2C55"/>
</linearGradient>
</defs>
<circle cx="50" cy="50" r="45" fill="url(#g)"/>
<path d="M60 30v28a12 12 0 1 1-8-11V30z" fill="white"/>
</svg>
</div>
);

const Header=()=>(
<header className="text-center mb-8 text-white">
<Logo/>
<h1 className="text-4xl md:text-5xl font-bold">TikTok Downloader</h1>
<p className="opacity-80">Download videos instantly — no watermark</p>
</header>
);

const App=()=>{
const[url,setUrl]=useState("");
const[loading,setLoading]=useState(false);
const[result,setResult]=useState(null);
const[error,setError]=useState("");

const fetchVideo=async()=>{
if(!url.includes("tiktok.com")){
setError("Enter valid TikTok URL");
return;
}
setLoading(true);
setError("");
try{
const r=await fetch("https://www.tikwm.com/api/",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`url=${encodeURIComponent(url)}`
});
const d=await r.json();
setResult(d.data.play);
}catch{
setError("API error");
}
setLoading(false);
};

return(
<div className="min-h-screen py-10 px-4">
<Header/>

<div className="max-w-xl mx-auto glass p-6 rounded-2xl shadow">

<input
value={url}
onChange={e=>setUrl(e.target.value)}
placeholder="Paste TikTok link..."
className="w-full border p-3 rounded-xl mb-4"
/>

<button
onClick={fetchVideo}
className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">
{loading?"Loading...":"Download"}
</button>

{error&&<p className="text-red-500 mt-3">{error}</p>}

{result&&(
<a href={result}
target="_blank"
className="block mt-5 text-center bg-green-500 text-white py-3 rounded-xl">
Download Now
</a>
)}

</div>

<footer className="text-center text-white/70 mt-10 text-sm">
Not affiliated with TikTok
</footer>

</div>
);
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
