/* DOWNLOADER */
const Downloader=()=>{
const[url,setUrl]=useState('');
const[loading,setLoading]=useState(false);
const[progress,setProgress]=useState(0);
const[video,setVideo]=useState(null);
const[error,setError]=useState('');

const fetchVideo=async()=>{
if(!url.includes("tiktok"))return setError("Enter valid URL");
setLoading(true);setError("");
try{
const r=await fetch("https://www.tikwm.com/api/",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`url=${encodeURIComponent(url)}&hd=1`
});
const d=await r.json();
if(d.data?.play)setVideo(d.data.play);
else setError("Video not found");
}catch{setError("Server error")}
setLoading(false);
};

const download=async()=>{
setProgress(10);
const res=await fetch(video);
const blob=await res.blob();
setProgress(100);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="tiktok.mp4";
a.click();
};

return(
<section className="glass rounded-2xl p-6 shadow-2xl">

<input
value={url}
onChange={e=>setUrl(e.target.value)}
placeholder="Paste TikTok link"
className="w-full px-4 py-3 border rounded-xl mb-4"/>

{!video&&
<button onClick={fetchVideo}
className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl">
{loading?"Processing...":"Find Video"}
</button>
}

{video&&
<button onClick={download}
className="w-full py-4 bg-green-600 text-white font-bold rounded-xl">

</button>
}

{progress>0&&<div className="bar mt-4"><div className="fill" style={{width:progress+"%"}}></div></div>}
