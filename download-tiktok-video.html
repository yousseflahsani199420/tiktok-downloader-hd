<script type="text/babel">
const { useState, useCallback } = React;

const CONFIG = {
  API_ENDPOINT: 'https://www.tikwm.com/api/',
  SITE_URL: 'https://tiktokdownloader.online/',
  MAX_TITLE_LENGTH: 60
};

const utils = {
  validateTikTokUrl: (url) => {
    const patterns = [
      /tiktok\.com\/@[\w.]+\/video\/\d+/,
      /tiktok\.com\/t\/[\w]+/,
      /vm\.tiktok\.com\/[\w]+/,
      /vt\.tiktok\.com\/[\w]+/
    ];
    return patterns.some(pattern => pattern.test(url));
  },

  sanitizeFilename: (title) => {
    return title
      .replace(/[^a-zA-Z0-9\u4e00-\u9fa5\s-]/g, '_')
      .replace(/\s+/g, '_')
      .substring(0, 50) || 'tiktok_video';
  },

  truncateText: (text, maxLength) => {
    if (!text) return '';
    return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
  }
};

const App = () => {
  return (
    <div className="min-h-screen py-6 px-4">
      <Header />
      <main className="max-w-4xl mx-auto space-y-6">
        <Breadcrumb />
        <DownloadCard />
        <SEOContent />
        <HowToUse />
        <Features />
      </main>
      <Footer />
    </div>
  );
};

    <h1 className="text-4xl md:text-5xl font-bold text-white mb-3">
      <span className="inline-block mr-2">🎵</span>
      Download Any TikTok Video Instantly
    </h1>
    <p className="text-white/90 text-lg max-w-xl mx-auto">
      Easily download any TikTok video to your device. Free online tool with HD quality support. No app needed.
    </p>
  </header>
);

const Breadcrumb = () => (
  <nav className="breadcrumb max-w-4xl mx-auto">
    <a href="/index.html">Home</a>
    <span>/</span>
    <span>Download TikTok Video</span>
  </nav>
);

const DownloadCard = () => {
  const [url, setUrl] = useState('');
  const [quality, setQuality] = useState('hd');
  const [loading, setLoading] = useState(false);
  const [downloading, setDownloading] = useState(false);
  const [downloadProgress, setDownloadProgress] = useState(0);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [videoInfo, setVideoInfo] = useState(null);

  const pasteFromClipboard = useCallback(async () => {
    try {
      const text = await navigator.clipboard.readText();
      setUrl(text);
      setError('');
    } catch (err) {
      setError('Unable to access clipboard. Please paste manually.');
    }
  }, []);

  const fetchVideo = useCallback(async () => {
    if (!url.trim()) {
      setError('Please enter a TikTok video URL');
      return;
    }

    if (!utils.validateTikTokUrl(url)) {
      setError('Please enter a valid TikTok URL');
      return;
    }

    setLoading(true);
    setError('');
    setSuccess('');
    setVideoInfo(null);

    try {
      const response = await fetch(CONFIG.API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `url=${encodeURIComponent(url)}&hd=${quality==='hd'?1:0}`
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      if (data.data && (data.data.play || data.data.music)) {
        const isAudioOnly = quality === 'audio';
        setVideoInfo({
          url: isAudioOnly ? data.data.music : data.data.play,
          title: data.data.title || 'TikTok Video',
          author: data.data.author?.nickname || 'Unknown',
          cover: data.data.cover,
          duration: data.data.duration,
          isAudio: isAudioOnly
        });
        setSuccess('Video found! Click Download Now.');
      } else throw new Error('No video data');
    } catch (err) {
      setError('Failed to fetch video. Please try again later.');
    } finally {
      setLoading(false);
    }
  }, [url, quality]);

  const downloadDirect = useCallback(async () => {
    if (!videoInfo?.url) return;
    setDownloading(true);
    setDownloadProgress(0);

    try {
      const response = await fetch(videoInfo.url);
      if (!response.ok) throw new Error('Download failed');

      const blob = await response.blob();
      const blobUrl = window.URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = blobUrl;
      const ext = videoInfo.isAudio ? 'mp3' : 'mp4';
      link.download = `${utils.sanitizeFilename(videoInfo.title)}_${quality}.${ext}`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      window.URL.revokeObjectURL(blobUrl);
      setSuccess('✅ Downloaded successfully!');
      setTimeout(() => { setVideoInfo(null); setUrl(''); setSuccess(''); }, 3000);
    } catch (err) {
      window.open(videoInfo.url, '_blank');
      setError('Opening in new tab...');
    } finally {
      setDownloading(false);
    }
  }, [videoInfo, quality]);

  const resetForm = useCallback(() => {
    setVideoInfo(null);
    setError('');
    setSuccess('');
  }, []);

  const qualityOptions = [
    { id: 'hd', icon: '🎬', label: 'HD', desc: 'Best Quality' },
    { id: 'sd', icon: '📱', label: 'SD', desc: 'Smaller Size' },
    { id: 'audio', icon: '🎵', label: 'Audio', desc: 'MP3 Only' }
  ];

  return (
    <div className="glass-effect rounded-2xl p-6 md:p-8 shadow-2xl">
      <div className="mb-6">
        <label className="block text-gray-700 font-semibold mb-2">TikTok Video URL</label>
        <div className="flex gap-2">
          <input
            type="text"
            value={url}
            onChange={(e) => setUrl(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && !videoInfo && fetchVideo()}
            placeholder="https://www.tiktok.com/@username/video/1234567890"
            className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none input-field"
            disabled={loading || downloading}
          />
          <button onClick={pasteFromClipboard} disabled={loading || downloading} className="px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl">📋</button>
        </div>
      </div>

      <div className="mb-6">
        <label className="block text-gray-700 font-semibold mb-3">Select Quality</label>
        <div className="grid grid-cols-3 gap-3">
          {qualityOptions.map((q) => (
            <div key={q.id} onClick={() => !loading && !downloading && setQuality(q.id)}
              className={`quality-card border-2 rounded-xl p-4 text-center ${quality===q.id?'selected border-indigo-500':'border-gray-200'} ${(loading||downloading)?'opacity-50':''}`}>
              <div className="text-2xl mb-1">{q.icon}</div>
              <div className="font-bold text-gray-800">{q.label}</div>
              <div className="text-xs text-gray-500">{q.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {!videoInfo && (
        <button onClick={fetchVideo} disabled={loading} className="w-full py-4 btn-primary text-white font-bold rounded-xl flex items-center justify-center gap-2">
          {loading ? <><div className="spinner"></div><span>Finding...</span></> : <><span>🔍</span><span>Find Video</span></>}
        </button>
      )}

      {videoInfo && !downloading && (
        <div className="fade-in">
          <div className="bg-green-50 border border-green-200 rounded-xl p-4 mb-4">
            <h3 className="font-bold text-green-800 mb-2">✅ Video Found!</h3>
            {videoInfo.cover && !videoInfo.isAudio && <img src={videoInfo.cover} alt="Thumbnail" className="w-full h-48 object-cover rounded-lg mb-3" />}
            <p className="text-sm text-green-700 font-medium">{utils.truncateText(videoInfo.title, 60)}</p>
            <p className="text-xs text-green-600 mt-1">👤 {videoInfo.author}</p>
          </div>
          <button onClick={downloadDirect} className="w-full py-4 btn-success text-white font-bold rounded-xl">⬇️ Download {quality==='audio'?'MP3':'MP4'}</button>
          <button onClick={resetForm} className="w-full mt-3 py-3 text-gray-500 hover:text-gray-700 text-sm font-medium">← Search different video</button>
        </div>
      )}

      {downloading && (
        <div className="bg-blue-50 rounded-xl p-6 text-center">
          <div className="spinner mx-auto mb-3"></div>
          <p className="text-blue-800 font-semibold">Downloading... {downloadProgress}%</p>
          <div className="progress-bar max-w-xs mx-auto"><div className="progress-fill" style={{width:`${downloadProgress}%`}}></div></div>
        </div>
      )}

      {error && <div className="mt-4 alert alert-error"><p className="font-medium">⚠️ {error}</p></div>}
      {success && !downloading && <div className="mt-4 alert alert-success"><p className="font-medium">{success}</p></div>}
    </div>
  );
};

const SEOContent = () => (
  <section className="seo-content">
    <h2>About Download TikTok Video</h2>
    <p>Easily download any TikTok video to your device. Free online tool with HD quality support. No app needed. Our tool is fast, secure, and works on any device.</p>

    <div class="faq-item">

    <h3>Related Tools</h3>

};
